<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoCal Store - Trailer & Truck Batch Board</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 10px;
      color: #e0e0e0;
      letter-spacing: 1px;
    }

    /* ---- Tabs ---- */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 20px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .tab-btn {
      padding: 10px 30px;
      background: #16213e;
      color: #888;
      border: 2px solid #333;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }

    .tab-btn:first-child { border-radius: 8px 0 0 8px; }
    .tab-btn:last-child { border-radius: 0 8px 8px 0; }

    .tab-btn.active {
      background: #2979ff;
      color: #fff;
      border-color: #2979ff;
    }

    .tab-btn:hover:not(.active) { background: #1e2d50; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ---- Legend ---- */
    .legend {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      color: #ccc;
    }

    .legend-dot { width: 16px; height: 16px; border-radius: 50%; }
    .legend-dot.green { background: #00c853; }
    .legend-dot.red { background: #ff1744; }
    .legend-dot.blue { background: #2979ff; }

    /* ---- API Key ---- */
    .api-key-bar {
      max-width: 1200px;
      margin: 0 auto 15px auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .api-key-bar label { font-size: 0.85rem; color: #aaa; }

    .api-key-bar input {
      flex: 1; min-width: 200px; padding: 8px 12px;
      border-radius: 6px; border: 1px solid #333;
      background: #16213e; color: #fff; font-size: 0.85rem;
    }

    .api-key-bar button {
      padding: 8px 16px; border-radius: 6px; border: none;
      background: #00c853; color: #fff; font-weight: 600;
      font-size: 0.85rem; cursor: pointer;
    }

    .api-key-bar button:hover { opacity: 0.85; }

    /* ---- Map ---- */
    .map-section { max-width: 1200px; margin: 0 auto 30px auto; }

    .map-header {
      font-size: 1.4rem; font-weight: 600; margin-bottom: 10px;
      padding-bottom: 8px; border-bottom: 2px solid #333; color: #e0e0e0;
    }

    #map {
      width: 100%; height: 400px; border-radius: 10px;
      background: #16213e; display: flex; align-items: center;
      justify-content: center; color: #555; font-size: 0.95rem;
    }

    .map-placeholder { text-align: center; padding: 20px; }

    /* ---- Board ---- */
    .section { max-width: 1200px; margin: 0 auto 40px auto; }

    .section-header {
      font-size: 1.4rem; font-weight: 600; margin-bottom: 15px;
      padding-bottom: 8px; border-bottom: 2px solid #333; color: #e0e0e0;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .card {
      background: #16213e; border-radius: 10px; padding: 15px 10px;
      text-align: center; cursor: pointer; border: 3px solid transparent;
      user-select: none;
    }

    .card.status-in-use { border-color: #00c853; box-shadow: 0 0 12px rgba(0,200,83,0.3); }
    .card.status-maintenance { border-color: #ff1744; box-shadow: 0 0 12px rgba(255,23,68,0.3); }
    .card.status-ready { border-color: #2979ff; box-shadow: 0 0 12px rgba(41,121,255,0.3); }

    .card-number { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; }
    .card.status-in-use .card-number { color: #00c853; }
    .card.status-maintenance .card-number { color: #ff1744; }
    .card.status-ready .card-number { color: #2979ff; }

    .card-label {
      font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
    }

    .card.status-in-use .card-label { color: #00c853; }
    .card.status-maintenance .card-label { color: #ff1744; }
    .card.status-ready .card-label { color: #2979ff; }

    .card-meta {
      font-size: 0.6rem; color: #777; min-height: 14px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px;
    }

    /* Status buttons */
    .status-buttons { display: none; flex-direction: column; gap: 5px; margin-top: 8px; }
    .card.expanded .status-buttons { display: flex; }

    .status-btn {
      padding: 6px 8px; border: none; border-radius: 6px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer;
      color: #fff; transition: opacity 0.15s;
    }

    .status-btn:hover { opacity: 0.85; }
    .status-btn.btn-in-use { background: #00c853; }
    .status-btn.btn-maintenance { background: #ff1744; }
    .status-btn.btn-ready { background: #2979ff; }

    /* ---- MODAL POPUP ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #16213e;
      border-radius: 14px;
      padding: 30px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      border: 2px solid #00c853;
    }

    .modal-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #00c853;
      margin-bottom: 20px;
      text-align: center;
    }

    .modal-field { margin-bottom: 14px; }

    .modal-field label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .modal-field input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f3460;
      color: #fff;
      font-size: 0.95rem;
    }

    .modal-field input:focus {
      outline: none;
      border-color: #00c853;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
    }

    .modal-buttons .modal-submit { background: #00c853; }
    .modal-buttons .modal-cancel { background: #555; }
    .modal-buttons button:hover { opacity: 0.85; }

    /* Summary */
    .summary {
      display: flex; justify-content: center;
      gap: 20px; margin-bottom: 15px; flex-wrap: wrap;
    }

    .summary-badge {
      padding: 6px 16px; border-radius: 20px;
      font-size: 0.85rem; font-weight: 600;
    }

    .summary-badge.green { background: rgba(0,200,83,0.15); color: #00c853; border: 1px solid #00c853; }
    .summary-badge.red { background: rgba(255,23,68,0.15); color: #ff1744; border: 1px solid #ff1744; }
    .summary-badge.blue { background: rgba(41,121,255,0.15); color: #2979ff; border: 1px solid #2979ff; }

    /* ---- Calendar ---- */
    .calendar-container { max-width: 1200px; margin: 0 auto; }

    .cal-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; margin-bottom: 20px;
    }

    .cal-nav button {
      padding: 8px 16px; border-radius: 6px; border: none;
      background: #16213e; color: #fff; font-size: 1rem;
      cursor: pointer; font-weight: 700;
    }

    .cal-nav button:hover { background: #1e2d50; }

    .cal-nav .cal-month-label {
      font-size: 1.3rem; font-weight: 600; color: #e0e0e0;
      min-width: 200px; text-align: center;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-day-header {
      text-align: center; font-size: 0.8rem;
      font-weight: 600; color: #888; padding: 8px 0;
    }

    .cal-day {
      background: #16213e; border-radius: 8px;
      min-height: 90px; padding: 6px; position: relative;
    }

    .cal-day.empty { background: transparent; }
    .cal-day.today { border: 2px solid #2979ff; }

    .cal-day-num { font-size: 0.8rem; font-weight: 600; color: #888; margin-bottom: 4px; }

    .cal-event {
      font-size: 0.6rem; padding: 2px 5px; border-radius: 4px;
      margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; color: #fff; font-weight: 600;
    }

    .cal-event.event-leave { background: #e65100; }
    .cal-event.event-return { background: #00c853; }

    .cal-legend {
      display: flex; justify-content: center; gap: 25px;
      margin-bottom: 20px; flex-wrap: wrap;
    }

    .cal-legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.85rem; color: #ccc;
    }

    .cal-legend-dot { width: 14px; height: 14px; border-radius: 4px; }
    .cal-legend-dot.orange { background: #e65100; }
    .cal-legend-dot.green { background: #00c853; }

    @media (max-width: 600px) {
      h1 { font-size: 1.4rem; }
      .board-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
      .card { padding: 12px 8px; }
      .card-number { font-size: 1.4rem; }
      #map { height: 280px; }
      .cal-day { min-height: 60px; }
      .cal-event { font-size: 0.5rem; }
      .modal-box { padding: 20px; }
    }
  </style>
</head>
<body>
  <h1>SoCal Store - Batch Board</h1>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab-btn active" id="tab-board-btn">Board</div>
    <div class="tab-btn" id="tab-calendar-btn">Calendar</div>
  </div>

  <!-- ===== BOARD TAB ===== -->
  <div class="tab-content active" id="tab-board">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot green"></div> In Use</div>
      <div class="legend-item"><div class="legend-dot red"></div> Maintenance Required</div>
      <div class="legend-item"><div class="legend-dot blue"></div> Ready for Use</div>
    </div>

    <div class="api-key-bar">
      <label>Google Maps API Key:</label>
      <input type="text" id="api-key-input" placeholder="Paste your API key here..." />
      <button id="api-key-save" type="button">Save & Load Map</button>
    </div>

    <div class="map-section">
      <div class="map-header">Active Deliveries Map</div>
      <div id="map">
        <div class="map-placeholder">Enter your Google Maps API key above to enable the map</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">Delivery Trucks</div>
      <div class="summary" id="truck-summary"></div>
      <div class="board-grid" id="truck-board"></div>
    </div>

    <div class="section">
      <div class="section-header">Rental Trailers</div>
      <div class="summary" id="trailer-summary"></div>
      <div class="board-grid" id="trailer-board"></div>
    </div>
  </div>

  <!-- ===== CALENDAR TAB ===== -->
  <div class="tab-content" id="tab-calendar">
    <div class="calendar-container">
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot orange"></div> Leaves</div>
        <div class="cal-legend-item"><div class="cal-legend-dot green"></div> Returns</div>
      </div>
      <div class="cal-nav">
        <button id="cal-prev" type="button">&lt;</button>
        <div class="cal-month-label" id="cal-month-label"></div>
        <button id="cal-next" type="button">&gt;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- ===== MODAL POPUP ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <div class="modal-title" id="modal-title">Send Out - Truck 1</div>
      <div class="modal-field">
        <label>Destination Address</label>
        <input type="text" id="modal-dest" placeholder="Enter delivery address..." />
      </div>
      <div class="modal-field">
        <label>Leave Date & Time</label>
        <input type="datetime-local" id="modal-leave" />
      </div>
      <div class="modal-field">
        <label>Expected Return Date & Time</label>
        <input type="datetime-local" id="modal-return" />
      </div>
      <div class="modal-buttons">
        <button class="modal-cancel" id="modal-cancel" type="button">Cancel</button>
        <button class="modal-submit" id="modal-submit" type="button">Send Out</button>
      </div>
    </div>
  </div>

  <script>
    /* ==============================
       GLOBALS
    ============================== */
    var STATUSES = {
      'in-use':      { label: 'In Use',       cssClass: 'status-in-use' },
      'maintenance': { label: 'Maintenance',   cssClass: 'status-maintenance' },
      'ready':       { label: 'Ready',          cssClass: 'status-ready' }
    };

    var TRUCK_COUNT = 12;
    var TRAILER_COUNT = 50;
    var STORAGE_KEY = 'socal-batch-board-v2';
    var API_KEY_STORAGE = 'socal-gmap-key';

    var map = null;
    var geocoder = null;
    var markers = [];
    var mapsLoaded = false;
    var calYear, calMonth;
    var activeModalCard = null; // which card the modal is for

    /* ==============================
       TABS
    ============================== */
    document.getElementById('tab-board-btn').onclick = function() {
      document.getElementById('tab-board-btn').classList.add('active');
      document.getElementById('tab-calendar-btn').classList.remove('active');
      document.getElementById('tab-board').classList.add('active');
      document.getElementById('tab-calendar').classList.remove('active');
    };

    document.getElementById('tab-calendar-btn').onclick = function() {
      document.getElementById('tab-calendar-btn').classList.add('active');
      document.getElementById('tab-board-btn').classList.remove('active');
      document.getElementById('tab-calendar').classList.add('active');
      document.getElementById('tab-board').classList.remove('active');
      renderCalendar();
    };

    /* ==============================
       STATE
    ============================== */
    function loadState() {
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch (e) {}
      return null;
    }

    function saveState() {
      var state = { trucks: {}, trailers: {} };
      var truckCards = document.getElementById('truck-board').getElementsByClassName('card');
      for (var i = 0; i < truckCards.length; i++) {
        var c = truckCards[i];
        state.trucks[c.getAttribute('data-id')] = {
          status: c.getAttribute('data-status'),
          dest: c.getAttribute('data-dest') || '',
          leave: c.getAttribute('data-leave') || '',
          returnDate: c.getAttribute('data-return') || ''
        };
      }
      var trailerCards = document.getElementById('trailer-board').getElementsByClassName('card');
      for (var i = 0; i < trailerCards.length; i++) {
        var c = trailerCards[i];
        state.trailers[c.getAttribute('data-id')] = {
          status: c.getAttribute('data-status'),
          dest: c.getAttribute('data-dest') || '',
          leave: c.getAttribute('data-leave') || '',
          returnDate: c.getAttribute('data-return') || ''
        };
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    /* ==============================
       GOOGLE MAPS
    ============================== */
    function loadGoogleMaps(apiKey) {
      if (mapsLoaded) return;
      var script = document.createElement('script');
      script.src = 'https://maps.googleapis.com/maps/api/js?key=' + apiKey + '&callback=initMap';
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    }

    window.initMap = function() {
      mapsLoaded = true;
      var mapDiv = document.getElementById('map');
      mapDiv.innerHTML = '';
      map = new google.maps.Map(mapDiv, {
        center: { lat: 34.0522, lng: -118.2437 },
        zoom: 9,
        styles: [
          { elementType: 'geometry', stylers: [{ color: '#1a1a2e' }] },
          { elementType: 'labels.text.stroke', stylers: [{ color: '#1a1a2e' }] },
          { elementType: 'labels.text.fill', stylers: [{ color: '#746855' }] },
          { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#2c3e6b' }] },
          { featureType: 'road', elementType: 'labels.text.fill', stylers: [{ color: '#9ca5b3' }] },
          { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0e1626' }] },
          { featureType: 'water', elementType: 'labels.text.fill', stylers: [{ color: '#515c6d' }] },
          { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] }
        ]
      });
      geocoder = new google.maps.Geocoder();
      refreshMapMarkers();
    };

    function clearMarkers() {
      for (var i = 0; i < markers.length; i++) markers[i].setMap(null);
      markers = [];
    }

    function refreshMapMarkers() {
      if (!map || !geocoder) return;
      clearMarkers();
      var allCards = document.querySelectorAll('.card[data-status="in-use"]');
      var bounds = new google.maps.LatLngBounds();

      for (var i = 0; i < allCards.length; i++) {
        var card = allCards[i];
        var dest = card.getAttribute('data-dest');
        if (!dest) continue;

        (function(cardRef, address) {
          geocoder.geocode({ address: address }, function(results, status) {
            if (status === 'OK' && results[0]) {
              var pos = results[0].geometry.location;
              var type = cardRef.getAttribute('data-type');
              var id = cardRef.getAttribute('data-id');
              var lbl = (type === 'truck' ? 'Truck ' : 'Trailer ') + id;
              var leave = cardRef.getAttribute('data-leave') || 'N/A';
              var ret = cardRef.getAttribute('data-return') || 'N/A';

              var marker = new google.maps.Marker({
                map: map, position: pos,
                title: lbl + ' - ' + address,
                label: { text: String(id), color: '#fff', fontWeight: '700' },
                icon: {
                  path: google.maps.SymbolPath.CIRCLE, scale: 14,
                  fillColor: type === 'truck' ? '#00c853' : '#00e676',
                  fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2
                }
              });

              var infoWindow = new google.maps.InfoWindow({
                content: '<div style="color:#222;font-size:13px;"><strong>' + lbl + '</strong><br>' +
                  address + '<br><span style="font-size:11px;">Leave: ' + formatDateDisplay(leave) +
                  '<br>Return: ' + formatDateDisplay(ret) + '</span></div>'
              });

              marker.addListener('click', function() { infoWindow.open(map, marker); });
              markers.push(marker);
              bounds.extend(pos);

              if (markers.length === 1) { map.setCenter(pos); map.setZoom(12); }
              else { map.fitBounds(bounds); }
            }
          });
        })(card, dest);
      }
    }

    /* ==============================
       MODAL
    ============================== */
    function openModal(card) {
      activeModalCard = card;
      var type = card.getAttribute('data-type');
      var id = card.getAttribute('data-id');
      var label = (type === 'truck' ? 'Truck ' : 'Trailer ') + id;

      document.getElementById('modal-title').textContent = 'Send Out - ' + label;
      document.getElementById('modal-dest').value = '';
      document.getElementById('modal-leave').value = '';
      document.getElementById('modal-return').value = '';
      document.getElementById('modal-overlay').classList.add('open');
      document.getElementById('modal-dest').focus();
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      activeModalCard = null;
    }

    document.getElementById('modal-cancel').onclick = function() {
      closeModal();
    };

    document.getElementById('modal-overlay').onclick = function(e) {
      if (e.target === document.getElementById('modal-overlay')) {
        closeModal();
      }
    };

    document.getElementById('modal-submit').onclick = function() {
      if (!activeModalCard) return;
      var dest = document.getElementById('modal-dest').value.trim();
      var leave = document.getElementById('modal-leave').value;
      var ret = document.getElementById('modal-return').value;

      setCardStatus(activeModalCard, 'in-use', dest, leave, ret);
      closeModal();
      saveState();
      updateSummaries();
      refreshMapMarkers();
    };

    /* ==============================
       CARD LOGIC
    ============================== */
    function formatDateDisplay(val) {
      if (!val) return '';
      var d = new Date(val);
      if (isNaN(d.getTime())) return val;
      return (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear() + ' ' +
        d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function setCardStatus(card, status, dest, leave, returnDate) {
      card.classList.remove('status-in-use', 'status-maintenance', 'status-ready');
      card.classList.add(STATUSES[status].cssClass);
      card.setAttribute('data-status', status);
      card.querySelector('.card-label').textContent = STATUSES[status].label;

      var destDiv = card.querySelector('.card-dest');
      var leaveDiv = card.querySelector('.card-leave');
      var returnDiv = card.querySelector('.card-return');

      if (status === 'in-use') {
        card.setAttribute('data-dest', dest || '');
        card.setAttribute('data-leave', leave || '');
        card.setAttribute('data-return', returnDate || '');
        destDiv.textContent = dest ? dest : '';
        leaveDiv.textContent = leave ? 'Out: ' + formatDateDisplay(leave) : '';
        returnDiv.textContent = returnDate ? 'Back: ' + formatDateDisplay(returnDate) : '';
      } else {
        card.setAttribute('data-dest', '');
        card.setAttribute('data-leave', '');
        card.setAttribute('data-return', '');
        destDiv.textContent = '';
        leaveDiv.textContent = '';
        returnDiv.textContent = '';
      }

      card.classList.remove('expanded');
    }

    function collapseAll() {
      var expanded = document.querySelectorAll('.card.expanded');
      for (var i = 0; i < expanded.length; i++) {
        expanded[i].classList.remove('expanded');
      }
    }

    function createCard(id, type, initialStatus, initialDest, initialLeave, initialReturn) {
      var card = document.createElement('div');
      card.className = 'card ' + STATUSES[initialStatus].cssClass;
      card.setAttribute('data-id', id);
      card.setAttribute('data-type', type);
      card.setAttribute('data-status', initialStatus);
      card.setAttribute('data-dest', initialDest || '');
      card.setAttribute('data-leave', initialLeave || '');
      card.setAttribute('data-return', initialReturn || '');

      var numberDiv = document.createElement('div');
      numberDiv.className = 'card-number';
      numberDiv.textContent = id;

      var labelDiv = document.createElement('div');
      labelDiv.className = 'card-label';
      labelDiv.textContent = STATUSES[initialStatus].label;

      var destDiv = document.createElement('div');
      destDiv.className = 'card-meta card-dest';
      destDiv.textContent = (initialStatus === 'in-use' && initialDest) ? initialDest : '';

      var leaveDiv = document.createElement('div');
      leaveDiv.className = 'card-meta card-leave';
      leaveDiv.textContent = (initialStatus === 'in-use' && initialLeave) ? 'Out: ' + formatDateDisplay(initialLeave) : '';

      var returnDiv = document.createElement('div');
      returnDiv.className = 'card-meta card-return';
      returnDiv.textContent = (initialStatus === 'in-use' && initialReturn) ? 'Back: ' + formatDateDisplay(initialReturn) : '';

      var btnContainer = document.createElement('div');
      btnContainer.className = 'status-buttons';

      var btnInUse = document.createElement('button');
      btnInUse.className = 'status-btn btn-in-use';
      btnInUse.textContent = 'In Use';
      btnInUse.setAttribute('type', 'button');

      var btnMaint = document.createElement('button');
      btnMaint.className = 'status-btn btn-maintenance';
      btnMaint.textContent = 'Maintenance';
      btnMaint.setAttribute('type', 'button');

      var btnReady = document.createElement('button');
      btnReady.className = 'status-btn btn-ready';
      btnReady.textContent = 'Ready';
      btnReady.setAttribute('type', 'button');

      // "In Use" opens the popup modal
      btnInUse.onclick = function(e) {
        e.stopPropagation();
        collapseAll();
        openModal(card);
      };

      btnMaint.onclick = function(e) {
        e.stopPropagation();
        setCardStatus(card, 'maintenance', '', '', '');
        saveState();
        updateSummaries();
        refreshMapMarkers();
      };

      btnReady.onclick = function(e) {
        e.stopPropagation();
        setCardStatus(card, 'ready', '', '', '');
        saveState();
        updateSummaries();
        refreshMapMarkers();
      };

      btnContainer.appendChild(btnInUse);
      btnContainer.appendChild(btnMaint);
      btnContainer.appendChild(btnReady);

      card.appendChild(numberDiv);
      card.appendChild(labelDiv);
      card.appendChild(destDiv);
      card.appendChild(leaveDiv);
      card.appendChild(returnDiv);
      card.appendChild(btnContainer);

      card.onclick = function(e) {
        e.stopPropagation();
        var isExpanded = card.classList.contains('expanded');
        collapseAll();
        if (!isExpanded) {
          card.classList.add('expanded');
        }
      };

      return card;
    }

    /* ==============================
       SUMMARIES
    ============================== */
    function updateSummaries() {
      updateSummary('truck-board', 'truck-summary');
      updateSummary('trailer-board', 'trailer-summary');
    }

    function updateSummary(boardId, summaryId) {
      var cards = document.getElementById(boardId).getElementsByClassName('card');
      var inUse = 0, maint = 0, ready = 0;
      for (var i = 0; i < cards.length; i++) {
        var s = cards[i].getAttribute('data-status');
        if (s === 'in-use') inUse++;
        else if (s === 'maintenance') maint++;
        else ready++;
      }
      document.getElementById(summaryId).innerHTML =
        '<span class="summary-badge green">In Use: ' + inUse + '</span>' +
        '<span class="summary-badge red">Maintenance: ' + maint + '</span>' +
        '<span class="summary-badge blue">Ready: ' + ready + '</span>';
    }

    /* ==============================
       CALENDAR
    ============================== */
    var MONTH_NAMES = ['January','February','March','April','May','June',
      'July','August','September','October','November','December'];
    var DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function getAllEvents() {
      var events = [];
      var allCards = document.querySelectorAll('.card[data-status="in-use"]');
      for (var i = 0; i < allCards.length; i++) {
        var c = allCards[i];
        var type = c.getAttribute('data-type');
        var id = c.getAttribute('data-id');
        var dest = c.getAttribute('data-dest') || '';
        var leave = c.getAttribute('data-leave');
        var ret = c.getAttribute('data-return');
        var label = (type === 'truck' ? 'T' : 'Tr') + id;

        if (leave) {
          events.push({ date: leave.split('T')[0], type: 'leave', label: label + ' out', dest: dest });
        }
        if (ret) {
          events.push({ date: ret.split('T')[0], type: 'return', label: label + ' back', dest: dest });
        }
      }
      return events;
    }

    function renderCalendar() {
      var grid = document.getElementById('cal-grid');
      grid.innerHTML = '';

      document.getElementById('cal-month-label').textContent =
        MONTH_NAMES[calMonth] + ' ' + calYear;

      for (var d = 0; d < 7; d++) {
        var hdr = document.createElement('div');
        hdr.className = 'cal-day-header';
        hdr.textContent = DAY_NAMES[d];
        grid.appendChild(hdr);
      }

      var firstDay = new Date(calYear, calMonth, 1).getDay();
      var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

      var today = new Date();
      var todayStr = today.getFullYear() + '-' +
        String(today.getMonth() + 1).padStart(2, '0') + '-' +
        String(today.getDate()).padStart(2, '0');

      var events = getAllEvents();
      var eventMap = {};
      for (var i = 0; i < events.length; i++) {
        var key = events[i].date;
        if (!eventMap[key]) eventMap[key] = [];
        eventMap[key].push(events[i]);
      }

      for (var i = 0; i < firstDay; i++) {
        var empty = document.createElement('div');
        empty.className = 'cal-day empty';
        grid.appendChild(empty);
      }

      for (var day = 1; day <= daysInMonth; day++) {
        var cell = document.createElement('div');
        cell.className = 'cal-day';

        var dateStr = calYear + '-' +
          String(calMonth + 1).padStart(2, '0') + '-' +
          String(day).padStart(2, '0');

        if (dateStr === todayStr) cell.classList.add('today');

        var numDiv = document.createElement('div');
        numDiv.className = 'cal-day-num';
        numDiv.textContent = day;
        cell.appendChild(numDiv);

        var dayEvents = eventMap[dateStr];
        if (dayEvents) {
          for (var j = 0; j < dayEvents.length; j++) {
            var ev = document.createElement('div');
            ev.className = 'cal-event ' + (dayEvents[j].type === 'leave' ? 'event-leave' : 'event-return');
            ev.textContent = dayEvents[j].label;
            ev.title = dayEvents[j].dest;
            cell.appendChild(ev);
          }
        }

        grid.appendChild(cell);
      }
    }

    document.getElementById('cal-prev').onclick = function() {
      calMonth--;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCalendar();
    };

    document.getElementById('cal-next').onclick = function() {
      calMonth++;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalendar();
    };

    /* ==============================
       INIT
    ============================== */
    function init() {
      var state = loadState();
      var truckBoard = document.getElementById('truck-board');
      var trailerBoard = document.getElementById('trailer-board');

      for (var i = 1; i <= TRUCK_COUNT; i++) {
        var saved = (state && state.trucks && state.trucks[i]) ? state.trucks[i] : null;
        var status = saved ? (saved.status || 'ready') : 'ready';
        var dest = saved ? (saved.dest || '') : '';
        var leave = saved ? (saved.leave || '') : '';
        var ret = saved ? (saved.returnDate || '') : '';
        truckBoard.appendChild(createCard(i, 'truck', status, dest, leave, ret));
      }

      for (var i = 1; i <= TRAILER_COUNT; i++) {
        var saved = (state && state.trailers && state.trailers[i]) ? state.trailers[i] : null;
        var status = saved ? (saved.status || 'ready') : 'ready';
        var dest = saved ? (saved.dest || '') : '';
        var leave = saved ? (saved.leave || '') : '';
        var ret = saved ? (saved.returnDate || '') : '';
        trailerBoard.appendChild(createCard(i, 'trailer', status, dest, leave, ret));
      }

      updateSummaries();

      var now = new Date();
      calYear = now.getFullYear();
      calMonth = now.getMonth();

      document.onclick = function() { collapseAll(); };

      var savedKey = localStorage.getItem(API_KEY_STORAGE);
      if (savedKey) {
        document.getElementById('api-key-input').value = savedKey;
        loadGoogleMaps(savedKey);
      }

      document.getElementById('api-key-save').onclick = function(e) {
        e.stopPropagation();
        var key = document.getElementById('api-key-input').value.trim();
        if (key) {
          localStorage.setItem(API_KEY_STORAGE, key);
          if (!mapsLoaded) loadGoogleMaps(key);
          else refreshMapMarkers();
        }
      };
    }

    init();
  </script>
</body>
