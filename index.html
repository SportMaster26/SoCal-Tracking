<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoCal Store - Trailer & Truck Batch Board</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 10px;
      color: #e0e0e0;
      letter-spacing: 1px;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      color: #ccc;
    }

    .legend-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }

    .legend-dot.green { background: #00c853; }
    .legend-dot.red { background: #ff1744; }
    .legend-dot.blue { background: #2979ff; }

    .section {
      max-width: 1200px;
      margin: 0 auto 40px auto;
    }

    .section-header {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 2px solid #333;
      color: #e0e0e0;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }

    .card {
      background: #16213e;
      border-radius: 10px;
      padding: 15px 10px;
      text-align: center;
      cursor: pointer;
      border: 3px solid transparent;
      user-select: none;
    }

    /* Status border colors */
    .card.status-in-use {
      border-color: #00c853;
      box-shadow: 0 0 12px rgba(0, 200, 83, 0.3);
    }

    .card.status-maintenance {
      border-color: #ff1744;
      box-shadow: 0 0 12px rgba(255, 23, 68, 0.3);
    }

    .card.status-ready {
      border-color: #2979ff;
      box-shadow: 0 0 12px rgba(41, 121, 255, 0.3);
    }

    .card-number {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card.status-in-use .card-number { color: #00c853; }
    .card.status-maintenance .card-number { color: #ff1744; }
    .card.status-ready .card-number { color: #2979ff; }

    .card-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .card.status-in-use .card-label { color: #00c853; }
    .card.status-maintenance .card-label { color: #ff1744; }
    .card.status-ready .card-label { color: #2979ff; }

    /* Status buttons inside each card */
    .status-buttons {
      display: none;
      flex-direction: column;
      gap: 5px;
      margin-top: 8px;
    }

    .card.expanded .status-buttons {
      display: flex;
    }

    .status-btn {
      padding: 6px 8px;
      border: none;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      transition: opacity 0.15s;
    }

    .status-btn:hover {
      opacity: 0.85;
    }

    .status-btn.btn-in-use { background: #00c853; }
    .status-btn.btn-maintenance { background: #ff1744; }
    .status-btn.btn-ready { background: #2979ff; }

    /* Summary counters */
    .summary {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .summary-badge {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .summary-badge.green { background: rgba(0,200,83,0.15); color: #00c853; border: 1px solid #00c853; }
    .summary-badge.red { background: rgba(255,23,68,0.15); color: #ff1744; border: 1px solid #ff1744; }
    .summary-badge.blue { background: rgba(41,121,255,0.15); color: #2979ff; border: 1px solid #2979ff; }

    @media (max-width: 600px) {
      h1 { font-size: 1.4rem; }
      .board-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 8px;
      }
      .card { padding: 12px 8px; }
      .card-number { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <h1>SoCal Store - Batch Board</h1>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot green"></div> In Use</div>
    <div class="legend-item"><div class="legend-dot red"></div> Maintenance Required</div>
    <div class="legend-item"><div class="legend-dot blue"></div> Ready for Use</div>
  </div>

  <!-- Delivery Trucks Section -->
  <div class="section">
    <div class="section-header">Delivery Trucks</div>
    <div class="summary" id="truck-summary"></div>
    <div class="board-grid" id="truck-board"></div>
  </div>

  <!-- Rental Trailers Section -->
  <div class="section">
    <div class="section-header">Rental Trailers</div>
    <div class="summary" id="trailer-summary"></div>
    <div class="board-grid" id="trailer-board"></div>
  </div>

  <script>
    var STATUSES = {
      'in-use':      { label: 'In Use',       cssClass: 'status-in-use' },
      'maintenance': { label: 'Maintenance',   cssClass: 'status-maintenance' },
      'ready':       { label: 'Ready',          cssClass: 'status-ready' }
    };

    var TRUCK_COUNT = 12;
    var TRAILER_COUNT = 50;
    var STORAGE_KEY = 'socal-batch-board';

    function loadState() {
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch (e) {}
      return null;
    }

    function saveState() {
      var state = { trucks: {}, trailers: {} };
      var truckCards = document.getElementById('truck-board').getElementsByClassName('card');
      for (var i = 0; i < truckCards.length; i++) {
        state.trucks[truckCards[i].getAttribute('data-id')] = truckCards[i].getAttribute('data-status');
      }
      var trailerCards = document.getElementById('trailer-board').getElementsByClassName('card');
      for (var i = 0; i < trailerCards.length; i++) {
        state.trailers[trailerCards[i].getAttribute('data-id')] = trailerCards[i].getAttribute('data-status');
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function setCardStatus(card, status) {
      card.classList.remove('status-in-use', 'status-maintenance', 'status-ready');
      card.classList.add(STATUSES[status].cssClass);
      card.setAttribute('data-status', status);
      card.querySelector('.card-label').textContent = STATUSES[status].label;
      // Collapse after picking
      card.classList.remove('expanded');
    }

    function collapseAll() {
      var expanded = document.querySelectorAll('.card.expanded');
      for (var i = 0; i < expanded.length; i++) {
        expanded[i].classList.remove('expanded');
      }
    }

    function createCard(id, type, initialStatus) {
      var card = document.createElement('div');
      card.className = 'card ' + STATUSES[initialStatus].cssClass;
      card.setAttribute('data-id', id);
      card.setAttribute('data-type', type);
      card.setAttribute('data-status', initialStatus);

      var numberDiv = document.createElement('div');
      numberDiv.className = 'card-number';
      numberDiv.textContent = id;

      var labelDiv = document.createElement('div');
      labelDiv.className = 'card-label';
      labelDiv.textContent = STATUSES[initialStatus].label;

      var btnContainer = document.createElement('div');
      btnContainer.className = 'status-buttons';

      var btnInUse = document.createElement('button');
      btnInUse.className = 'status-btn btn-in-use';
      btnInUse.textContent = 'In Use';
      btnInUse.setAttribute('type', 'button');

      var btnMaint = document.createElement('button');
      btnMaint.className = 'status-btn btn-maintenance';
      btnMaint.textContent = 'Maintenance';
      btnMaint.setAttribute('type', 'button');

      var btnReady = document.createElement('button');
      btnReady.className = 'status-btn btn-ready';
      btnReady.textContent = 'Ready';
      btnReady.setAttribute('type', 'button');

      // Button click handlers
      btnInUse.onclick = function(e) {
        e.stopPropagation();
        setCardStatus(card, 'in-use');
        saveState();
        updateSummaries();
      };

      btnMaint.onclick = function(e) {
        e.stopPropagation();
        setCardStatus(card, 'maintenance');
        saveState();
        updateSummaries();
      };

      btnReady.onclick = function(e) {
        e.stopPropagation();
        setCardStatus(card, 'ready');
        saveState();
        updateSummaries();
      };

      btnContainer.appendChild(btnInUse);
      btnContainer.appendChild(btnMaint);
      btnContainer.appendChild(btnReady);

      card.appendChild(numberDiv);
      card.appendChild(labelDiv);
      card.appendChild(btnContainer);

      // Card click to expand/collapse
      card.onclick = function(e) {
        e.stopPropagation();
        var isExpanded = card.classList.contains('expanded');
        collapseAll();
        if (!isExpanded) {
          card.classList.add('expanded');
        }
      };

      return card;
    }

    function updateSummaries() {
      updateSummary('truck-board', 'truck-summary');
      updateSummary('trailer-board', 'trailer-summary');
    }

    function updateSummary(boardId, summaryId) {
      var cards = document.getElementById(boardId).getElementsByClassName('card');
      var inUse = 0, maint = 0, ready = 0;
      for (var i = 0; i < cards.length; i++) {
        var s = cards[i].getAttribute('data-status');
        if (s === 'in-use') inUse++;
        else if (s === 'maintenance') maint++;
        else ready++;
      }
      document.getElementById(summaryId).innerHTML =
        '<span class="summary-badge green">In Use: ' + inUse + '</span>' +
        '<span class="summary-badge red">Maintenance: ' + maint + '</span>' +
        '<span class="summary-badge blue">Ready: ' + ready + '</span>';
    }

    // Build the boards
    function init() {
      var state = loadState();
      var truckBoard = document.getElementById('truck-board');
      var trailerBoard = document.getElementById('trailer-board');

      for (var i = 1; i <= TRUCK_COUNT; i++) {
        var status = (state && state.trucks && state.trucks[i]) ? state.trucks[i] : 'ready';
        truckBoard.appendChild(createCard(i, 'truck', status));
      }

      for (var i = 1; i <= TRAILER_COUNT; i++) {
        var status = (state && state.trailers && state.trailers[i]) ? state.trailers[i] : 'ready';
        trailerBoard.appendChild(createCard(i, 'trailer', status));
      }

      updateSummaries();

      // Click anywhere else to collapse open cards
      document.onclick = function() {
        collapseAll();
      };
    }

    init();
  </script>
</body>
</html>
